{% extends 'base.html' %}

{% block title %}Excluir Veículo - Frotas{% endblock %}

{% block content %}
<div class="card">
    <h1>Excluir Veículo</h1>
    
    <div class="confirm-box">
        <p>Tem certeza que deseja excluir o veículo <strong>{{ veiculo.placa }}</strong> ({{ veiculo.marca }})?</p>
    </div>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-delete">Sim, Excluir</button>
        <a href="{% url 'veiculo_list' %}" class="btn btn-back margin-left">Cancelar</a>
    </form>
</div>
{% endblock %}
