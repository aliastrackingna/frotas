<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excluir Veículo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .alert { background-color: #f44336; color: white; padding: 15px; margin: 20px 0; }
        button { padding: 10px 20px; border: none; cursor: pointer; margin-right: 10px; }
        .btn-delete { background-color: #f44336; color: white; }
        .btn-back { background-color: #9E9E9E; color: white; }
    </style>
</head>
<body>
    <h1>Excluir Veículo</h1>
    
    <div class="alert">
        <p>Tem certeza que deseja excluir o veículo <strong>{{ veiculo.placa }}</strong> ({{ veiculo.marca }})?</p>
    </div>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-delete">Sim, Excluir</button>
        <a href="{% url 'veiculo_list' %}" class="btn-back" style="display:inline-block; padding:10px 20px; background-color:#9E9E9E; color:white; text-decoration:none;">Cancelar</a>
    </form>
</body>
</html>
