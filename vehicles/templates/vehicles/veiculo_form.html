<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if veiculo %}Editar{% else %}Novo{% endif %} Veículo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 500px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-top: 5px; }
        button { margin-top: 15px; padding: 10px 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .btn-back { background-color: #9E9E9E; margin-left: 10px; }
    </style>
</head>
<body>
    <h1>{% if veiculo %}Editar{% else %}Novo{% endif %} Veículo</h1>
    
    <form method="post">
        {% csrf_token %}
        <label for="placa">Placa:</label>
        <input type="text" id="placa" name="placa" value="{{ veiculo.placa|default:'' }}" required maxlength="7">
        
        <label for="marca">Marca:</label>
        <input type="text" id="marca" name="marca" value="{{ veiculo.marca|default:'' }}" required maxlength="50">
        
        <label for="quantidade_passageiros">Quantidade de Passageiros:</label>
        <input type="number" id="quantidade_passageiros" name="quantidade_passageiros" value="{{ veiculo.quantidade_passageiros|default:'' }}" required min="1">
        
        <label for="km_inicial">KM Inicial:</label>
        <input type="number" id="km_inicial" name="km_inicial" value="{{ veiculo.km_inicial|default:'0' }}" min="0">
        
        <label for="kms_atual">KM Atual:</label>
        <input type="number" id="kms_atual" name="kms_atual" value="{{ veiculo.kms_atual|default:'0' }}" min="0">
        
        <button type="submit">Salvar</button>
        <a href="{% url 'veiculo_list' %}" class="btn-back" style="display:inline-block; padding:10px 20px; background-color:#9E9E9E; color:white; text-decoration:none; margin-left:10px;">Cancelar</a>
    </form>
</body>
</html>
