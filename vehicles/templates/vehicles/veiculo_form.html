{% extends 'base.html' %}

{% block title %}{% if veiculo %}Editar{% else %}Novo{% endif %} Veículo - Frotas{% endblock %}

{% block content %}
<div class="card">
    <h1>{% if veiculo %}Editar{% else %}Novo{% endif %} Veículo</h1>
    
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label for="placa" style="display: block; font-weight: bold; margin-bottom: 5px;">Placa:</label>
            <input type="text" id="placa" name="placa" value="{{ veiculo.placa|default:'' }}" required maxlength="7" style="width: 100%; padding: 10px;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label for="marca" style="display: block; font-weight: bold; margin-bottom: 5px;">Marca:</label>
            <input type="text" id="marca" name="marca" value="{{ veiculo.marca|default:'' }}" required maxlength="50" style="width: 100%; padding: 10px;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label for="quantidade_passageiros" style="display: block; font-weight: bold; margin-bottom: 5px;">Quantidade de Passageiros:</label>
            <input type="number" id="quantidade_passageiros" name="quantidade_passageiros" value="{{ veiculo.quantidade_passageiros|default:'' }}" required min="1" style="width: 100%; padding: 10px;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label for="km_inicial" style="display: block; font-weight: bold; margin-bottom: 5px;">KM Inicial:</label>
            <input type="number" id="km_inicial" name="km_inicial" value="{{ veiculo.km_inicial|default:'0' }}" min="0" style="width: 100%; padding: 10px;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label for="kms_atual" style="display: block; font-weight: bold; margin-bottom: 5px;">KM Atual:</label>
            <input type="number" id="kms_atual" name="kms_atual" value="{{ veiculo.kms_atual|default:'0' }}" min="0" style="width: 100%; padding: 10px;">
        </div>
        
        <button type="submit" style="padding: 12px 24px; background-color: #4CAF50; color: white; border: none; cursor: pointer; font-size: 16px;">Salvar</button>
        <a href="{% url 'veiculo_list' %}" style="display:inline-block; padding: 12px 24px; background-color: #9E9E9E; color: white; text-decoration: none; margin-left: 10px;">Cancelar</a>
    </form>
</div>
{% endblock %}
