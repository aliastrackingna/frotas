{% extends 'base.html' %}

{% block title %}{% if motorista %}Editar{% else %}Novo{% endif %} Motorista - Frotas{% endblock %}

{% block content %}
<div class="card">
    <h1>{% if motorista %}Editar{% else %}Novo{% endif %} Motorista</h1>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" value="{{ motorista.nome|default:'' }}" required maxlength="100">
        </div>
        
        <div class="form-group">
            <label for="tipo_carteira">Tipo de Carteira:</label>
            <select id="tipo_carteira" name="tipo_carteira" required>
                <option value="">Selecione...</option>
                <option value="A" {% if motorista.tipo_carteira == 'A' %}selected{% endif %}>A - Motocicleta</option>
                <option value="B" {% if motorista.tipo_carteira == 'B' %}selected{% endif %}>B - Carro</option>
                <option value="C" {% if motorista.tipo_carteira == 'C' %}selected{% endif %}>C - Caminhão</option>
                <option value="D" {% if motorista.tipo_carteira == 'D' %}selected{% endif %}>D - Ônibus</option>
                <option value="E" {% if motorista.tipo_carteira == 'E' %}selected{% endif %}>E - Carreta</option>
            </select>
        </div>
        
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="{% url 'motorista_list' %}" class="btn btn-back margin-left">Cancelar</a>
    </form>
</div>
{% endblock %}
