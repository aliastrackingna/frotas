{% extends 'base.html' %}

{% block title %}Agendar Solicitação de Motorista - Frotas{% endblock %}

{% block content %}
<div class="card">
    <h1>Agendar Solicitação de Motorista</h1>
    
    {% if error %}
    <div style="padding: 15px; background-color: {% if success %}#4CAF50{% else %}#f44336{% endif %}; color: white; border-radius: 4px; margin-bottom: 20px;">
        {{ error }}
    </div>
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        
        <div style="margin-bottom: 15px;">
            <label for="data_inicio" style="display: block; font-weight: bold; margin-bottom: 5px;">Data e Hora de Início:</label>
            <input type="datetime-local" id="data_inicio" name="data_inicio" required style="width: 100%; padding: 10px;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label for="data_fim_prevista" style="display: block; font-weight: bold; margin-bottom: 5px;">Data e Hora Prevista de Retorno:</label>
            <input type="datetime-local" id="data_fim_prevista" name="data_fim_prevista" required style="width: 100%; padding: 10px;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label for="observacao" style="display: block; font-weight: bold; margin-bottom: 5px;">Observação:</label>
            <textarea id="observacao" name="observacao" rows="3" style="width: 100%; padding: 10px;"></textarea>
        </div>
        
        <button type="submit" style="padding: 12px 24px; background-color: #4CAF50; color: white; border: none; cursor: pointer; font-size: 16px;">Agendar</button>
        <a href="{% url 'solicitacao_list' %}" style="display:inline-block; padding: 12px 24px; background-color: #9E9E9E; color: white; text-decoration: none; margin-left: 10px;">Cancelar</a>
    </form>
</div>
{% endblock %}
