{% extends 'base.html' %}

{% block title %}Agendar Solicitação de Motorista - Frotas{% endblock %}

{% block content %}
<div class="header">
    <h1>➕ Nova Solicitação de Motorista</h1>
    <a href="{% url 'solicitacao_list' %}" class="btn btn-back">← Voltar</a>
</div>

<div class="form-card">
    {% if error %}
    <div class="alert {% if success %}alert-success{% else %}alert-error{% endif %}" style="margin-bottom: 20px;">
        {{ error }}
    </div>
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Data e Hora de Início</label>
            <div class="form-row">
                <div class="form-group" style="flex: 1;">
                    <input type="text" id="data_inicio_data" name="data_inicio_data" class="flatpickr-date" required placeholder="Data">
                </div>
                <div class="form-group" style="flex: 1;">
                    <select id="data_inicio_hora" name="data_inicio_hora" required>
                        {% include 'utils/options_util.html' %}
                    </select>
                </div>
            </div>
        </div>
        
        <div class="form-group">
            <label>Data e Hora Prevista de Retorno</label>
            <div class="form-row">
                <div class="form-group" style="flex: 1;">
                    <input type="text" id="data_fim_prevista_data" name="data_fim_prevista_data" class="flatpickr-date" required placeholder="Data">
                </div>
                <div class="form-group" style="flex: 1;">
                    <select id="data_fim_prevista_hora" name="data_fim_prevista_hora" required>
                        {% include 'utils/options_util.html' %}
                    </select>
                </div>
            </div>
        </div>
        
        <div class="form-group">
            <label for="observacao">Observação</label>
            <textarea id="observacao" name="observacao" rows="3" placeholder="Alguma observação adicional..."></textarea>
        </div>
        
        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <button type="submit" class="btn btn-primary">📅 Agendar</button>
            <a href="{% url 'solicitacao_list' %}" class="btn btn-back">Cancelar</a>
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        flatpickr(".flatpickr-date", {
            dateFormat: "Y-m-d",
            altFormat: "d/m/Y",
            minDate: "today",
            locale: "pt"
        });
    });
</script>
{% endblock %}
