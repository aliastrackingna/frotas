{% extends 'base.html' %}

{% block title %}Agendar Solicitação de Motorista - Frotas{% endblock %}

{% block content %}
<div class="card">
    <h1>Agendar Solicitação de Motorista</h1>
    
    {% if error %}
    <div class="alert {% if success %}alert-success{% else %}alert-error{% endif %}">
        {{ error }}
    </div>
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="data_inicio">Data e Hora de Início:</label>
            <input type="datetime-local" id="data_inicio" name="data_inicio" required>
        </div>
        
        <div class="form-group">
            <label for="data_fim_prevista">Data e Hora Prevista de Retorno:</label>
            <input type="datetime-local" id="data_fim_prevista" name="data_fim_prevista" required>
        </div>
        
        <div class="form-group">
            <label for="observacao">Observação:</label>
            <textarea id="observacao" name="observacao" rows="3"></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary">Agendar</button>
        <a href="{% url 'solicitacao_list' %}" class="btn btn-back margin-left">Cancelar</a>
    </form>
</div>
{% endblock %}
