<!DOCTYPE html>
{% load static %}
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Frotas{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav class="menu">
        <span class="menu-brand">🚚 Frotas</span>
        <div class="menu-items">
            <a href="{% url 'index' %}" class="menu-item">Início</a>
            <div class="menu-dropdown">
                <span class="menu-item">Veículos ▾</span>
                <div class="dropdown-content">
                    <a href="{% url 'veiculo_list' %}">Listar</a>
                    <a href="{% url 'veiculo_create' %}">Cadastrar</a>
                </div>
            </div>
            <div class="menu-dropdown">
                <span class="menu-item">Motoristas ▾</span>
                <div class="dropdown-content">
                    <a href="{% url 'motorista_list' %}">Listar</a>
                    <a href="{% url 'motorista_create' %}">Cadastrar</a>
                </div>
            </div>
            <div class="menu-dropdown">
                <span class="menu-item">Viagens ▾</span>
                <div class="dropdown-content">
                    <a href="{% url 'solicitacao_viagem_list' %}">Solicitações</a>
                    <a href="{% url 'solicitacao_viagem_create' %}">Nova Viagem</a>
                    <a href="{% url 'solicitacao_list' %}">Motoristas</a>
                    <a href="{% url 'solicitacao_create' %}">Agendar Motorista</a>
                </div>
            </div>
            <a href="{% url 'portaria_list' %}" class="menu-item">Portaria</a>
            <div class="menu-dropdown">
                <span class="menu-item">+Mais ▾</span>
                <div class="dropdown-content">
                    <a href="/admin/">Admin</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
